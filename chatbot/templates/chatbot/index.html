<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Syn - Syandrix AI Assistant</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Segoe UI', sans-serif;
      background: #0f0f1a;
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
    }

    .chat-container {
      width: 420px;
      background: #1a1a2e;
      border-radius: 16px;
      overflow: hidden;
      display: flex;
      flex-direction: column;
      box-shadow: 0 20px 60px rgba(0,0,0,0.5);
      height: 580px;
    }

    /* ── Header ── */
    .chat-header {
      background: linear-gradient(135deg, #6c63ff, #3f3d9e);
      padding: 18px 22px;
      color: white;
      font-size: 1.1rem;
      font-weight: 600;
      display: flex;
      align-items: center;
      gap: 10px;
    }

    .dot {
      width: 10px;
      height: 10px;
      background: #7effa0;
      border-radius: 50%;
    }

    .clear-btn {
      margin-left: auto;
      background: transparent;
      border: 1px solid rgba(255,255,255,0.35);
      color: white;
      border-radius: 8px;
      padding: 4px 12px;
      cursor: pointer;
      font-size: 0.78rem;
      transition: background 0.2s;
    }
    .clear-btn:hover { background: rgba(255,255,255,0.15); }

    /* ── Messages ── */
    .messages {
      flex: 1;
      padding: 20px;
      overflow-y: auto;
      display: flex;
      flex-direction: column;
      gap: 12px;
    }

    .message {
      max-width: 78%;
      padding: 10px 14px;
      border-radius: 18px;
      font-size: 0.9rem;
      line-height: 1.5;
      animation: fadeUp 0.2s ease;
      white-space: pre-wrap;       /* keeps newlines from OpenAI replies */
      word-break: break-word;
    }

    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(8px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    .user {
      background: #6c63ff;
      color: #fff;
      align-self: flex-end;
      border-bottom-right-radius: 4px;
    }

    .bot {
      background: #2a2a45;
      color: #e0e0ff;
      align-self: flex-start;
      border-bottom-left-radius: 4px;
    }

    /* ── Typing indicator ── */
    .typing {
      background: #2a2a45;
      align-self: flex-start;
      border-bottom-left-radius: 4px;
      padding: 12px 16px;
      border-radius: 18px;
      display: flex;
      gap: 5px;
      align-items: center;
    }

    .typing span {
      width: 7px;
      height: 7px;
      background: #6c63ff;
      border-radius: 50%;
      animation: bounce 1.2s infinite;
    }
    .typing span:nth-child(2) { animation-delay: 0.2s; }
    .typing span:nth-child(3) { animation-delay: 0.4s; }

    @keyframes bounce {
      0%, 80%, 100% { transform: translateY(0); }
      40%           { transform: translateY(-6px); }
    }

    /* ── Input bar ── */
    .chat-input {
      display: flex;
      padding: 14px;
      border-top: 1px solid #2a2a45;
      gap: 10px;
    }

    .chat-input input {
      flex: 1;
      background: #2a2a45;
      border: none;
      border-radius: 24px;
      padding: 10px 16px;
      color: #e0e0ff;
      font-size: 0.9rem;
      outline: none;
    }
    .chat-input input::placeholder { color: #666; }

    .chat-input button {
      background: #6c63ff;
      border: none;
      border-radius: 50%;
      width: 42px;
      height: 42px;
      cursor: pointer;
      color: white;
      font-size: 1.2rem;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: background 0.2s;
    }
    .chat-input button:hover  { background: #5a54d4; }
    .chat-input button:disabled { background: #444; cursor: not-allowed; }
  </style>
</head>
<body>

<div class="chat-container">

  <div class="chat-header">
    <div class="dot"></div>
    Syn - Syandrix AI Assistant
    <button class="clear-btn" onclick="clearChat()">🗑 Clear</button>
  </div>

  <div class="messages" id="messages">
    <div class="message bot">👋 Hi! I'm Syn, Syandrix's AI assistant. Try saying hello, ask for a joke, or type "help"!</div>
  </div>

  <div class="chat-input">
    <input type="text" id="userInput" placeholder="Type a message..." autocomplete="off" />
    <button id="sendBtn" onclick="sendMessage()">➤</button>
  </div>

</div>

<script>
  const input   = document.getElementById("userInput");
  const messages = document.getElementById("messages");
  const sendBtn  = document.getElementById("sendBtn");

  // Send on Enter key
  input.addEventListener("keydown", e => {
    if (e.key === "Enter") sendMessage();
  });

  // Add a chat bubble
  function addMessage(text, sender) {
    const div = document.createElement("div");
    div.className = `message ${sender}`;
    div.textContent = text;
    messages.appendChild(div);
    messages.scrollTop = messages.scrollHeight;
    return div;
  }

  // Show animated typing dots while waiting for bot
  function showTyping() {
    const div = document.createElement("div");
    div.className = "typing";
    div.id = "typing-indicator";
    div.innerHTML = "<span></span><span></span><span></span>";
    messages.appendChild(div);
    messages.scrollTop = messages.scrollHeight;
  }

  function hideTyping() {
    const el = document.getElementById("typing-indicator");
    if (el) el.remove();
  }

  // Send message to Django backend
  async function sendMessage() {
    const text = input.value.trim();
    if (!text) return;

    addMessage(text, "user");
    input.value = "";

    // Disable input while waiting
    input.disabled = true;
    sendBtn.disabled = true;
    showTyping();

    try {
      const res = await fetch("/chat/", {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({ message: text })
      });
      const data = await res.json();
      hideTyping();
      addMessage(data.reply, "bot");
    } catch (err) {
      hideTyping();
      addMessage("⚠️ Something went wrong. Please try again.", "bot");
    } finally {
      input.disabled = false;
      sendBtn.disabled = false;
      input.focus();
    }
  }

  // Clear chat history (frontend + backend)
  async function clearChat() {
    await fetch("/clear/", { method: "POST" });
    messages.innerHTML = '<div class="message bot">🗑 Chat cleared! Start a fresh conversation 👋</div>';
  }
</script>

</body>
</html>
