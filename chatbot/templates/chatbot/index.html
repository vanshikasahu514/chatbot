<!DOCTYPE html>
<html lang="en">
<head>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/marked/9.1.6/marked.min.js"></script>
  <meta charset="UTF-8"/>
  <title>Syn - Sayndrix AI Assistant</title>
  <style>
    *{box-sizing:border-box;margin:0;padding:0}
    body{font-family:'Segoe UI',sans-serif;background:#f0f0f0;display:flex;justify-content:center;align-items:center;height:100vh}
    .chat-container{width:420px;background:#fff;border-radius:16px;overflow:hidden;display:flex;flex-direction:column;box-shadow:0 8px 40px rgba(0,0,0,.12);border:1px solid rgba(242,140,40,.25);height:580px}
    .chat-header{background:#F28C28;border-bottom:2px solid #d47820;padding:18px 22px;color:#fff;font-size:1.1rem;font-weight:600;display:flex;align-items:center;gap:10px}
    .dot{width:10px;height:10px;background:#fff;border-radius:50%}
    .clear-btn{margin-left:auto;background:transparent;border:1px solid rgba(255,255,255,.5);color:#fff;border-radius:8px;padding:4px 12px;cursor:pointer;font-size:.78rem}
    .clear-btn:hover{background:rgba(255,255,255,.15)}
    .messages{flex:1;padding:20px;overflow-y:auto;display:flex;flex-direction:column;gap:12px;background:#fff}
    .messages::-webkit-scrollbar{width:4px}
    .messages::-webkit-scrollbar-thumb{background:rgba(242,140,40,.3);border-radius:4px}
    .message{max-width:78%;padding:10px 14px;border-radius:18px;font-size:.9rem;line-height:1.5;animation:fadeUp .2s ease;word-break:break-word}
    @keyframes fadeUp{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}
    .user{background:#F28C28;color:#000;align-self:flex-end;border-bottom-right-radius:4px}
    .bot{background:#fff;color:#111;align-self:flex-start;border-bottom-left-radius:4px;border:1px solid rgba(242,140,40,.25);box-shadow:0 2px 8px rgba(0,0,0,.07);max-width:90%}
    .bot p{margin:0 0 8px}.bot p:last-child{margin-bottom:0}
    .bot ol{padding-left:20px;margin:6px 0;list-style-type:decimal}
    .bot ul{padding-left:20px;margin:4px 0;list-style-type:disc}
    .bot li{margin:3px 0;line-height:1.5}
    .bot strong{font-weight:700;color:#d47820}
    .bot h1,.bot h2,.bot h3{margin:8px 0 4px;font-weight:700;color:#F28C28}
    .bot pre{background:#f4f4f4;border-radius:8px;padding:10px 12px;margin:8px 0;overflow-x:auto;font-size:.82rem}
    .bot code{background:#f0f0f0;border-radius:4px;padding:1px 5px;font-family:'Courier New',monospace;font-size:.85em}
    .bot pre code{background:transparent;padding:0}

    /* Voice banner */
    .voice-banner{display:none;align-items:center;justify-content:center;gap:10px;padding:7px 16px;background:#fff8f0;border-top:1px solid rgba(242,140,40,.2);font-size:.82rem;color:#d47820;font-weight:500}
    .voice-banner.show{display:flex}
    .pulse-ring{width:10px;height:10px;border-radius:50%;background:#F28C28;animation:pulseRing 1s infinite}
    @keyframes pulseRing{0%,100%{transform:scale(1);opacity:1}50%{transform:scale(1.5);opacity:.5}}

    /* Typing */
    .typing{background:#fff;border:1px solid rgba(242,140,40,.25);align-self:flex-start;border-bottom-left-radius:4px;padding:12px 16px;border-radius:18px;display:flex;gap:5px;align-items:center}
    .typing span{width:7px;height:7px;background:#F28C28;border-radius:50%;animation:bounce 1.2s infinite}
    .typing span:nth-child(2){animation-delay:.2s}
    .typing span:nth-child(3){animation-delay:.4s}
    @keyframes bounce{0%,80%,100%{transform:translateY(0)}40%{transform:translateY(-6px)}}

    /* Input bar */
    .chat-input{display:flex;padding:12px 14px;border-top:1px solid #e0e0e0;gap:8px;background:#fff;align-items:center}
    .chat-input input{flex:1;background:#f5f5f5;border:1px solid rgba(242,140,40,.3);border-radius:24px;padding:10px 16px;color:#111;font-size:.9rem;outline:none;transition:border-color .2s}
    .chat-input input:focus{border-color:#F28C28}
    .chat-input input::placeholder{color:#aaa}
    .icon-btn{border:none;border-radius:50%;width:42px;height:42px;cursor:pointer;font-size:1.1rem;display:flex;align-items:center;justify-content:center;transition:all .2s;flex-shrink:0}
    .send-btn{background:#F28C28;color:#000}
    .send-btn:hover:not(:disabled){background:#d47820}
    .send-btn:disabled{background:#ccc;cursor:not-allowed}
    .mic-btn{background:transparent;border:2px solid #F28C28;color:#F28C28}
    .mic-btn:hover:not(:disabled){background:#F28C28;color:#fff}
    .mic-btn.recording{background:#F28C28;color:#fff;animation:micPulse 1s infinite}
    .mic-btn:disabled{border-color:#ccc;color:#ccc;cursor:not-allowed}
    @keyframes micPulse{0%,100%{box-shadow:0 0 0 0 rgba(242,140,40,.5)}50%{box-shadow:0 0 0 8px rgba(242,140,40,0)}}
  </style>
</head>
<body>
<div class="chat-container">
  <div class="chat-header">
    <div class="dot"></div>
    Syn — Sayndrix AI Assistant
    <button class="clear-btn" onclick="clearChat()">🗑 Clear</button>
  </div>

  <div class="messages" id="messages">
    <div class="message bot"> Hi! I'm <strong>Syn</strong>, Sayndrix's AI assistant.<br>Type your question or click to speak!</div>
  </div>

  <div class="voice-banner" id="voiceBanner">
    <div class="pulse-ring"></div>
    <span id="voiceStatus">Listening… speak now</span>
  </div>

  <div class="chat-input">
    <input type="text" id="userInput" placeholder="Type a message..." autocomplete="off"/>
    <button class="icon-btn mic-btn"  id="micBtn"  onclick="toggleVoice()" title="Click to speak">🎤</button>
    <button class="icon-btn send-btn" id="sendBtn" onclick="sendMessage()">➤</button>
  </div>
</div>

<script>
  const inputEl      = document.getElementById("userInput");
  const messagesEl   = document.getElementById("messages");
  const sendBtn      = document.getElementById("sendBtn");
  const micBtn       = document.getElementById("micBtn");
  const voiceBanner  = document.getElementById("voiceBanner");
  const voiceStatus  = document.getElementById("voiceStatus");

  marked.setOptions({ breaks: true, gfm: true });
  inputEl.addEventListener("keydown", e => { if (e.key === "Enter") sendMessage(); });

  // ── Bubbles ──────────────────────────────────────────────────────────────
  function addMessage(text, sender) {
    const div = document.createElement("div");
    div.className = `message ${sender}`;
    div.innerHTML = sender === "bot" ? marked.parse(text) : "";
    if (sender !== "bot") div.textContent = text;
    messagesEl.appendChild(div);
    messagesEl.scrollTop = messagesEl.scrollHeight;
    return div;
  }

  function showTyping() {
    const d = document.createElement("div");
    d.className = "typing"; d.id = "typing-ind";
    d.innerHTML = "<span></span><span></span><span></span>";
    messagesEl.appendChild(d);
    messagesEl.scrollTop = messagesEl.scrollHeight;
  }
  function hideTyping() { const e = document.getElementById("typing-ind"); if(e) e.remove(); }
  function setDisabled(v) { inputEl.disabled = sendBtn.disabled = micBtn.disabled = v; }

  // ── Text send ────────────────────────────────────────────────────────────
  async function sendMessage() {
    const text = inputEl.value.trim();
    if (!text) return;
    addMessage(text, "user");
    inputEl.value = "";
    setDisabled(true); showTyping();
    try {
      const res  = await fetch("/api/chat/", {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({ message: text })
      });
      const data = await res.json();
      hideTyping();
      addMessage(data.reply || data.error || "Error", "bot");
    } catch {
      hideTyping();
      addMessage(" Server not reachable. Run: python manage.py runserver", "bot");
    } finally { setDisabled(false); inputEl.focus(); }
  }

  async function clearChat() {
    try { await fetch("/api/clear/", { method: "POST" }); } catch {}
    messagesEl.innerHTML = '<div class="message bot">🗑 Chat cleared!</div>';
  }

  // ════════════════════════════════════════════════════════
  //  VOICE — MediaRecorder → sends audio blob to Django
  //  Django uses speech_recognition (offline capable)
  // ════════════════════════════════════════════════════════
  let mediaRecorder = null;
  let audioChunks   = [];
  let isRecording   = false;
  let mediaStream   = null;

  async function startRecording() {
    try {
      mediaStream = await navigator.mediaDevices.getUserMedia({ audio: true });
    } catch (err) {
      addMessage("🎤 Mic access denied. Allow microphone in browser and try again.", "bot");
      return;
    }

    // Pick best supported format
    const mimeType = MediaRecorder.isTypeSupported("audio/webm;codecs=opus")
      ? "audio/webm;codecs=opus"
      : MediaRecorder.isTypeSupported("audio/webm")
      ? "audio/webm"
      : "audio/ogg";

    mediaRecorder  = new MediaRecorder(mediaStream, { mimeType });
    audioChunks    = [];
    isRecording    = true;

    mediaRecorder.ondataavailable = e => { if (e.data.size > 0) audioChunks.push(e.data); };

    mediaRecorder.onstop = async () => {
      stopRecordingUI();
      const blob = new Blob(audioChunks, { type: mimeType });
      await sendAudioToServer(blob, mimeType);
    };

    mediaRecorder.start();

    // UI
    micBtn.classList.add("recording");
    micBtn.textContent = "⏹";
    micBtn.title = "Tap to stop";
    voiceBanner.classList.add("show");
    voiceStatus.textContent = "Recording… tap ⏹ when done";
  }

  function stopRecording() {
    if (mediaRecorder && isRecording) {
      isRecording = false;
      mediaRecorder.stop();
      mediaStream?.getTracks().forEach(t => t.stop());
    }
  }

  function stopRecordingUI() {
    isRecording = false;
    micBtn.classList.remove("recording");
    micBtn.textContent = "🎤";
    micBtn.title = "Click to speak";
    voiceBanner.classList.remove("show");
  }

  function toggleVoice() {
    if (isRecording) {
      stopRecording();
    } else {
      startRecording();
    }
  }

  // ── Send audio blob to Django /api/voice/ ────────────────────────────────
  async function sendAudioToServer(blob, mimeType) {
    voiceStatus.textContent = "Processing speech…";
    voiceBanner.classList.add("show");
    setDisabled(true);
    showTyping();

    try {
      const ext      = mimeType.includes("ogg") ? ".ogg" : ".webm";
      const formData = new FormData();
      formData.append("audio", blob, "recording" + ext);

      const res  = await fetch("/api/voice/", { method: "POST", body: formData });
      const data = await res.json();
      hideTyping();
      voiceBanner.classList.remove("show");

      if (data.status === "ok") {
        // Show what was heard
        addMessage(data.transcript, "user");
        // Show and speak the answer
        addMessage(data.reply, "bot");
        speakText(data.reply);
      } else {
        addMessage("🎤 " + (data.error || "Voice processing failed."), "bot");
      }
    } catch {
      hideTyping();
      voiceBanner.classList.remove("show");
      addMessage(" Voice request failed. Server not reachable.", "bot");
    } finally {
      setDisabled(false);
      inputEl.focus();
    }
  }

  // ── Browser TTS for reply ─────────────────────────────────────────────────
  function speakText(text) {
    if (!window.speechSynthesis) return;
    const clean = text
      .replace(/\*\*(.*?)\*\*/g, "$1").replace(/\*(.*?)\*/g, "$1")
      .replace(/#{1,6}\s?/g, "").replace(/`[^`]*`/g, "")
      .replace(/[-•]\s/g, "").replace(/\n+/g, ". ");
    window.speechSynthesis.cancel();
    const u    = new SpeechSynthesisUtterance(clean);
    u.lang     = "en-US"; u.rate = 1.0; u.volume = 1.0;
    const pick = window.speechSynthesis.getVoices().find(
      v => v.lang === "en-US" && v.name.includes("Google")
    );
    if (pick) u.voice = pick;
    window.speechSynthesis.speak(u);
  }
  window.speechSynthesis?.getVoices();
  window.speechSynthesis?.addEventListener?.("voiceschanged", () => window.speechSynthesis.getVoices());
</script>
</body>
</html>
