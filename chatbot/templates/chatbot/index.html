<!DOCTYPE html>
<html lang="en">
<head>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/marked/9.1.6/marked.min.js"></script>
  <meta charset="UTF-8" />
  <title>Syn - Sayndrix AI Assistant</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Segoe UI', sans-serif;
      background: #ffffff;
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
    }

    .chat-container {
      width: 420px;
      background: #ffffff;
      border-radius: 16px;
      overflow: hidden;
      display: flex;
      flex-direction: column;
      box-shadow: 0 8px 40px rgba(0,0,0,0.12);
      border: 1px solid rgba(242,140,40,0.25);
      height: 580px;
    }

    /* ── Header ── */
    .chat-header {
      background: #F28C28;
      border-bottom: 2px solid #d47820;
      padding: 18px 22px;
      color: #ffffff;
      font-size: 1.1rem;
      font-weight: 600;
      display: flex;
      align-items: center;
      gap: 10px;
    }

    .dot {
      width: 10px;
      height: 10px;
      background: #ffffff;
      border-radius: 50%;
    }

    .clear-btn {
      margin-left: auto;
      background: transparent;
      border: 1px solid rgba(255,255,255,0.5);
      color: #ffffff;
      border-radius: 8px;
      padding: 4px 12px;
      cursor: pointer;
      font-size: 0.78rem;
      transition: background 0.2s;
    }

    .clear-btn:hover {
      background: rgba(255,255,255,0.15);
    }

    /* ── Messages ── */
    .messages {
      flex: 1;
      padding: 20px;
      overflow-y: auto;
      display: flex;
      flex-direction: column;
      gap: 12px;
      background: #ffffff;
    }

    .message {
      max-width: 78%;
      padding: 10px 14px;
      border-radius: 18px;
      font-size: 0.9rem;
      line-height: 1.5;
      animation: fadeUp 0.2s ease;
      word-break: break-word;
    }

    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(8px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    .user {
      background: #F28C28;
      color: #000000;
      align-self: flex-end;
      border-bottom-right-radius: 4px;
    }

    .bot {
      background: #ffffff;
      color: #000000;
      align-self: flex-start;
      border-bottom-left-radius: 4px;
      border: 1px solid rgba(242,140,40,0.25);
      box-shadow: 0 2px 8px rgba(0,0,0,0.07);
      max-width: 90%;
    }

    /* ── Markdown content inside bot messages ── */
    .bot p {
      margin: 0 0 8px 0;
    }
    .bot p:last-child {
      margin-bottom: 0;
    }

    /* Ordered lists */
    .bot ol {
      padding-left: 20px;
      margin: 6px 0;
      list-style-type: decimal;
    }

    /* Unordered lists */
    .bot ul {
      padding-left: 20px;
      margin: 4px 0;
      list-style-type: disc;
    }

    /* Nested unordered lists (■ style bullets) */
    .bot ul ul,
    .bot ol ul {
      padding-left: 18px;
      margin: 2px 0;
      list-style-type: square;
    }

    .bot li {
      margin: 3px 0;
      line-height: 1.5;
    }

    .bot li > p {
      margin: 0;
    }

    /* Code blocks */
    .bot pre {
      background: #f4f4f4;
      border-radius: 8px;
      padding: 10px 12px;
      margin: 8px 0;
      overflow-x: auto;
      white-space: pre-wrap;
      word-break: break-word;
      font-size: 0.82rem;
    }

    .bot code {
      background: #f0f0f0;
      border-radius: 4px;
      padding: 1px 5px;
      font-size: 0.85em;
      font-family: 'Courier New', monospace;
    }

    .bot pre code {
      background: transparent;
      padding: 0;
      font-size: inherit;
    }

    /* Strong / bold */
    .bot strong {
      font-weight: 700;
    }

    /* Headings inside bot */
    .bot h1, .bot h2, .bot h3, .bot h4 {
      margin: 8px 0 4px;
      font-weight: 700;
      line-height: 1.3;
    }

    /* ── Typing indicator ── */
    .typing {
      background: #ffffff;
      border: 1px solid rgba(242,140,40,0.25);
      align-self: flex-start;
      border-bottom-left-radius: 4px;
      padding: 12px 16px;
      border-radius: 18px;
      display: flex;
      gap: 5px;
      align-items: center;
    }

    .typing span {
      width: 7px;
      height: 7px;
      background: #F28C28;
      border-radius: 50%;
      animation: bounce 1.2s infinite;
    }
    .typing span:nth-child(2) { animation-delay: 0.2s; }
    .typing span:nth-child(3) { animation-delay: 0.4s; }

    @keyframes bounce {
      0%, 80%, 100% { transform: translateY(0); }
      40%           { transform: translateY(-6px); }
    }

    /* ── Input bar ── */
    .chat-input {
      display: flex;
      padding: 14px;
      border-top: 1px solid #e0e0e0;
      gap: 10px;
      background: #ffffff;
    }

    .chat-input input {
      flex: 1;
      background: #f5f5f5;
      border: 1px solid rgba(242,140,40,0.3);
      border-radius: 24px;
      padding: 10px 16px;
      color: #111111;
      font-size: 0.9rem;
      outline: none;
    }
    .chat-input input::placeholder { color: #aaaaaa; }
    .chat-input input:focus { border-color: #F28C28; }

    .chat-input button {
      background: #F28C28;
      border: none;
      border-radius: 50%;
      width: 42px;
      height: 42px;
      cursor: pointer;
      color: #000000;
      font-size: 1.2rem;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: background 0.2s;
    }
    .chat-input button:hover  { background: #d47820; }
    .chat-input button:disabled { background: #cccccc; cursor: not-allowed; }
  </style>
</head>
<body>

<div class="chat-container">

  <div class="chat-header">
    <div class="dot"></div>
    Syn - Sayndrix AI Assistant
    <button class="clear-btn" onclick="clearChat()">🗑 Clear</button>
  </div>

  <div class="messages" id="messages">
    <div class="message bot">👋 Hi! I'm Syn, Sayndrix's AI assistant.</div>
  </div>

  <div class="chat-input">
    <input type="text" id="userInput" placeholder="Type a message..." autocomplete="off" />
    <button id="sendBtn" onclick="sendMessage()">➤</button>
  </div>

</div>

<script>
  const input    = document.getElementById("userInput");
  const messages = document.getElementById("messages");
  const sendBtn  = document.getElementById("sendBtn");

  // Send on Enter key
  input.addEventListener("keydown", e => {
    if (e.key === "Enter") sendMessage();
  });

  // Add a chat bubble
  function addMessage(text, sender) {
    const div = document.createElement("div");
    div.className = `message ${sender}`;

    if (sender === "bot") {
      div.innerHTML = marked.parse(text);
    } else {
      div.textContent = text;
    }

    messages.appendChild(div);
    messages.scrollTop = messages.scrollHeight;
    return div;
  }

  // Show animated typing dots while waiting for bot
  function showTyping() {
    const div = document.createElement("div");
    div.className = "typing";
    div.id = "typing-indicator";
    div.innerHTML = "<span></span><span></span><span></span>";
    messages.appendChild(div);
    messages.scrollTop = messages.scrollHeight;
  }

  function hideTyping() {
    const el = document.getElementById("typing-indicator");
    if (el) el.remove();
  }

  // Send message to Django backend
  async function sendMessage() {
    const text = input.value.trim();
    if (!text) return;

    addMessage(text, "user");
    input.value = "";

    // Disable input while waiting
    input.disabled = true;
    sendBtn.disabled = true;
    showTyping();

    try {
      const res = await fetch("/chat/", {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({ message: text })
      });
      const data = await res.json();
      hideTyping();
      addMessage(data.reply, "bot");
    } catch (err) {
      hideTyping();
      addMessage("⚠️ Something went wrong. Please try again.", "bot");
    } finally {
      input.disabled = false;
      sendBtn.disabled = false;
      input.focus();
    }
  }

  // Clear chat history (frontend + backend)
  async function clearChat() {
    await fetch("/clear/", { method: "POST" });
    messages.innerHTML = '<div class="message bot">🗑 Chat cleared! Start a fresh conversation 👋</div>';
  }
</script>

</body>
</html>
